name: Version Update and Publish

on:
    push:
        branches: [master]

jobs:
    update-version:
        name: Update Package Version
        runs-on: ubuntu-latest
        permissions:
            contents: write
        outputs:
            version_updated: ${{ steps.update.outputs.version_updated }}
            new_version: ${{ steps.update.outputs.new_version }}
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'

            - name: Install dependencies
              run: npm ci

            - name: Get commit message and determine version bump
              id: version_info
              run: |
                  COMMIT_MSG=$(git log -1 --pretty=%B)
                  echo "Commit message: $COMMIT_MSG"

                  if [[ $COMMIT_MSG == *"breaking"* ]] || [[ $COMMIT_MSG == *"major"* ]]; then
                    echo "BUMP_TYPE=major" >> $GITHUB_OUTPUT
                  elif [[ $COMMIT_MSG == *"feat"* ]] || [[ $COMMIT_MSG == *"feature"* ]]; then
                    echo "BUMP_TYPE=minor" >> $GITHUB_OUTPUT
                  elif [[ $COMMIT_MSG == *"fix"* ]] || [[ $COMMIT_MSG == *"bugfix"* ]]; then
                    echo "BUMP_TYPE=patch" >> $GITHUB_OUTPUT
                  else
                    echo "BUMP_TYPE=patch" >> $GITHUB_OUTPUT
                  fi

            - name: Update version
              id: update
              run: |
                  BUMP_TYPE=${{ steps.version_info.outputs.BUMP_TYPE }}
                  echo "Bumping $BUMP_TYPE version..."

                  NEW_VERSION=$(npm version $BUMP_TYPE --no-git-tag-version)
                  echo "New version: $NEW_VERSION"

                  git config --local user.email "github-actions[bot]@users.noreply.github.com"
                  git config --local user.name "github-actions[bot]"
                  git add package.json
                  git commit -m "chore: bump version to $NEW_VERSION"
                  git push

                  echo "version_updated=true" >> $GITHUB_OUTPUT
                  echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

    publish:
        name: Publish to NPM
        runs-on: ubuntu-latest
        needs: update-version
        if: needs.update-version.outputs.version_updated == 'true'
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  registry-url: 'https://registry.npmjs.org/'

            - name: Install dependencies
              run: npm ci

            - name: Run linting
              run: npm run lint

            - name: Build package
              run: npm run build

            - name: Publish to NPM
              run: npm publish
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}

    merge-master-to-develop:
        name: Merge master to develop
        runs-on: ubuntu-latest
        needs: publish
        permissions:
            contents: write
            pull-requests: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  fetch-depth: 0

            - name: Merge master into develop
              run: |
                  git config --local user.email "github-actions[bot]@users.noreply.github.com"
                  git config --local user.name "github-actions[bot]"

                  git fetch origin
                  git checkout develop

                  git pull origin develop

                  git merge origin/master --no-ff -m "chore: merge master into develop [skip ci]"

                  git push origin develop

                  echo "✅ Successfully merged master into develop"

            - name: Create Git Tag for release
              run: |
                  VERSION=${{ needs.update-version.outputs.new_version }}
                  git tag -a "$VERSION" -m "Release $VERSION"
                  git push origin "$VERSION"
              if: success()
